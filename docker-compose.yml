# Production stack. Designed to be deployed by viewerSoftware's autodeploy
# pipeline (canary blue-green + nginx reverse-proxy upstream on host).
#
#   - No host port bindings: nginx_reverse_proxy reaches the frontend via the
#     shared `reverse_proxy` external network. Mongo + backend stay on the
#     private `fiestas-network`.
#   - Multi-stage builds: backend produces a slim runtime image without dev
#     deps; frontend produces a vite-built static bundle served by nginx
#     inside the container on :3000.
#   - Healthchecks on every service: deploy pipeline waits for `healthy`
#     before flipping the upstream.
#   - All secrets sourced from .env (gitignored). See .env.example.

services:
  mongodb:
    image: mongo:7.0
    container_name: fiestas-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - fiestas-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fiestas-backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DATABASE}?authSource=admin
      UPLOAD_PATH: /app/uploads
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - fiestas-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health >/dev/null 2>&1 || curl -fsS http://localhost:5000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fiestas-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fiestas-network
      - reverse_proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || curl -fsS http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 5

volumes:
  mongodb_data:
  backend_uploads:

networks:
  fiestas-network:
    driver: bridge
  reverse_proxy:
    external: true
